syntax = "proto3";

package worker;

// ---------------------------------------------------------------------------
// CreateFileSystem
// ---------------------------------------------------------------------------

message CreateFileSystemRequest {
  // Unique identifier for the filesystem. Used as the zvol name under the
  // configured ZFS pool (e.g. "testpool/<id>").
  string id = 1;

  // Size of the zvol in bytes. Defaults to 1 GiB (1073741824) if not set
  // or set to 0.
  uint64 size_bytes = 2;
}

message CreateFileSystemResponse {
  // Fully-qualified zvol dataset name, e.g. "testpool/my-fs".
  string zvol = 1;

  // Block device path exposed by the kernel, e.g. "/dev/zvol/testpool/my-fs".
  string device = 2;

  // Filesystem type formatted onto the device (always "ext4").
  string fs_type = 3;

  // Size of the zvol in bytes (as actually created).
  uint64 size_bytes = 4;
}

// ---------------------------------------------------------------------------
// DeleteFileSystem
// ---------------------------------------------------------------------------

message DeleteFileSystemRequest {
  // Identifier of the filesystem to delete (same value passed to
  // CreateFileSystem).
  string id = 1;
}

message DeleteFileSystemResponse {}

// ---------------------------------------------------------------------------
// Service
// ---------------------------------------------------------------------------

service Worker {
  // Create a ZFS zvol named after `id`, then format it with ext4.
  rpc CreateFileSystem (CreateFileSystemRequest) returns (CreateFileSystemResponse);

  // Destroy the zvol (and its block device) identified by `id`.
  rpc DeleteFileSystem (DeleteFileSystemRequest) returns (DeleteFileSystemResponse);
}
